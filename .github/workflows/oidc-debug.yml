name: OIDC Debug

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request OIDC Token
        shell: bash
        run: |
          echo "Requesting OIDC token..."

          RESPONSE=$(curl -s \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github")

          echo "Raw response:"
          echo "$RESPONSE"

          TOKEN=$(echo "$RESPONSE" | jq -r '.value')

          if [ "$TOKEN" = "null" ]; then
            echo "Failed to obtain token"
            exit 1
          fi

          echo ""
          echo "Token successfully obtained."
          echo "Token length: ${#TOKEN}"
