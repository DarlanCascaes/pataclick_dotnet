name: OIDC Debug

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test GitHub -> JFrog OIDC
        shell: bash
        run: |
          TOKEN=$(curl -s \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" \
          | jq -r '.value')

          echo "JWT OK"
          echo "JWT Length: ${#TOKEN}"

          REQUEST=$(jq -n \
            --arg token "$TOKEN" \
          '{
            grant_type:"urn:ietf:params:oauth:grant-type:token-exchange",
            subject_token_type:"urn:ietf:params:oauth:token-type:id_token",
            subject_token:$token,
            provider_name:"github-jfrog-oidc"
          }')

          JFROG_RESPONSE=$(curl -s \
          -X POST \
          https://pataclick.jfrog.io/access/api/v1/oidc/token \
          -H "Content-Type: application/json" \
          -d "$REQUEST")

          echo ""
          echo "===== JFROG RESPONSE ====="
          echo "$JFROG_RESPONSE"

          ACCESS_TOKEN=$(echo "$JFROG_RESPONSE" | jq -r '.access_token')
          USERNAME=$(echo "$JFROG_RESPONSE" | jq -r '.username')
          EXPIRES=$(echo "$JFROG_RESPONSE" | jq -r '.expires_in')

          echo ""
          echo "===== PARSED ====="
          echo "USERNAME=$USERNAME"
          echo "EXPIRES=$EXPIRES"
          echo "ACCESS_TOKEN_LENGTH=${#ACCESS_TOKEN}"
          echo ""

          echo "===== TESTING NUGET ENDPOINT ====="

          curl -v \
            -u "$USERNAME:$ACCESS_TOKEN" \
            https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-release/index.json

          ACCESS_TOKEN=$(echo "$JFROG_RESPONSE" | jq -r '.access_token')
          USERNAME=$(echo "$JFROG_RESPONSE" | jq -r '.username')

          dotnet nuget list source
          echo ""
          echo "===== BUILD ====="

          dotnet restore src/Demo.Library/Demo.Library.csproj

          dotnet build src/Demo.Library/Demo.Library.csproj \
            --configuration Release \
            --no-restore

          echo ""
          echo "===== PACK ====="

          dotnet pack src/Demo.Library/Demo.Library.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts

          echo ""
          echo "===== GENERATED PACKAGES ====="

          ls -la ./artifacts
          echo ""
          echo "===== PUBLISH ====="

          dotnet nuget push \
            ./artifacts/*.nupkg \
            --source jfrog \
            --skip-duplicate

          mkdir consumer

          cd consumer

          dotnet new console -n TestConsumer

          cd TestConsumer

          dotnet nuget remove source jfrog-virtual || true

          dotnet nuget add source \
          https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-central \
            --name jfrog-virtual \
            --username "$USERNAME" \
            --password "$ACCESS_TOKEN" \
            --store-password-in-clear-text

          dotnet nuget list source
          dotnet add package Demo.Library \
            --version 1.0.0 \
            --source https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-central

          mkdir external

          cd external

          dotnet new console -n ExternalTest

          cd ExternalTest
          curl -v \
            -u "$USERNAME:$ACCESS_TOKEN" \
            "https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-central/FindPackagesById()?id='Newtonsoft.Json'"
          curl -v \
            -u "$USERNAME:$ACCESS_TOKEN" \
            "https://pataclick.jfrog.io/artifactory/api/nuget/nuget-api-proxy/FindPackagesById()?id='Newtonsoft.Json'"
          curl -u "$USERNAME:$ACCESS_TOKEN" \
            "https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-central/Packages?\$top=5"
          dotnet restore
