name: OIDC Debug

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test GitHub -> JFrog OIDC
        shell: bash
        run: |
          TOKEN=$(curl -s \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" \
          | jq -r '.value')

          echo "JWT OK"
          echo "JWT Length: ${#TOKEN}"

          REQUEST=$(jq -n \
            --arg token "$TOKEN" \
          '{
            grant_type:"urn:ietf:params:oauth:grant-type:token-exchange",
            subject_token_type:"urn:ietf:params:oauth:token-type:id_token",
            subject_token:$token,
            provider_name:"github-jfrog-oidc"
          }')

          JFROG_RESPONSE=$(curl -s \
          -X POST \
          https://pataclick.jfrog.io/access/api/v1/oidc/token \
          -H "Content-Type: application/json" \
          -d "$REQUEST")

          echo ""
          echo "===== JFROG RESPONSE ====="
          echo "$JFROG_RESPONSE"

          ACCESS_TOKEN=$(echo "$JFROG_RESPONSE" | jq -r '.access_token')
          USERNAME=$(echo "$JFROG_RESPONSE" | jq -r '.username')
          EXPIRES=$(echo "$JFROG_RESPONSE" | jq -r '.expires_in')

          echo ""
          echo "===== PARSED ====="
          echo "USERNAME=$USERNAME"
          echo "EXPIRES=$EXPIRES"
          echo "ACCESS_TOKEN_LENGTH=${#ACCESS_TOKEN}"
