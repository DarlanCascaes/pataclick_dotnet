name: OIDC Debug

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test GitHub -> JFrog OIDC
        shell: bash
        run: |
          TOKEN=$(curl -s \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" \
          | jq -r '.value')

          echo "JWT obtained"
          echo "Token size: ${#TOKEN}"

          RESPONSE=$(jq -n \
          --arg token "$TOKEN" \
          '{
          grant_type:"urn:ietf:params:oauth:grant-type:token-exchange",
          subject_token_type:"urn:ietf:params:oauth:token-type:id_token",
          subject_token:$token,
          provider_name:"github-jfrog-oidc"
          }')

          echo "Sending request to JFrog..."

          curl -s \
          -X POST \
          https://pataclick.jfrog.io/access/api/v1/oidc/token \
          -H "Content-Type: application/json" \
          -d "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          echo ""
          echo "Testing Artifactory..."

          curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            https://pataclick.jfrog.io/artifactory/api/system/ping

          echo ""
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          echo "Access token size: ${#ACCESS_TOKEN}"

          echo "Username:"
          echo "$RESPONSE" | jq -r '.username'

          echo "Expires:"
          echo "$RESPONSE" | jq -r '.expires_in'
          dotnet nuget add source \
          https://pataclick.jfrog.io/artifactory/api/nuget/pataclick-nuget-release \
          --name jfrog \
          --username "$USERNAME" \
          --password "$ACCESS_TOKEN" \
          --store-password-in-clear-text
